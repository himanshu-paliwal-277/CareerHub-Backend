version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:7.0-alpine
    container_name: careerhub-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: careerhub
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - careerhub-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: careerhub-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      DB_URL: mongodb://admin:password123@mongodb:27017/careerhub?authSource=admin
      JWT_SECRET: your_jwt_secret_key_here_change_in_production
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - /app/node_modules
    networks:
      - careerhub-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/api/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data:
  mongodb_config:

networks:
  careerhub-network:
    driver: bridge
